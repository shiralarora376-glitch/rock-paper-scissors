<!DOCTYPE html>
<html>
<head>
  <title>My Games</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
    }

    /* CARD */
    .card {
      position: relative;
      width: 280px;
      background-color: #000;
      padding: 20px;
      border-radius: 12px;
      color: white;
      text-align: left;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      left: -5px;
      margin: auto;
      width: 290px;
      height: 100%;
      border-radius: 14px;
      background: linear-gradient(-45deg, #e81cff, #40c9ff);
      z-index: -1;
    }

    .heading {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
      text-align: center;
    }

    /* GAME LINKS */
    .game-link {
      display: block;
      padding: 10px;
      margin: 8px 0;
      background: #111;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .game-link:hover {
      background: #333;
      transform: translateX(5px);
    }

  </style>
</head>

<body>

  <div class="card">

    <div class="heading">🎮 My Games</div>

    <a href="./games/rps/" class="game-link">
      ✊ Rock Paper Scissors
    </a>

    <a href="./games/tictactoe/" class="game-link">
      ❌⭕ Tic Tac Toe
    </a>

    <a href="./games/memory-game/" class="game-link">
      🧠 Memory Game
    </a>

  </div>

</body>
</html>
